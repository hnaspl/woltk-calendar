version: "3.9"

services:
  app:
    build: .
    container_name: wotlk_calendar_app
    restart: unless-stopped
    environment:
      FLASK_APP: wsgi.py
      # Set FLASK_ENV to control all security settings:
      #   "development" / "dev" → HTTP-friendly (cookies without Secure flag)
      #   "production"          → HTTPS-enforced (cookies with Secure flag)
      FLASK_ENV: "${FLASK_ENV:-development}"
      # REQUIRED: set a strong random secret key (e.g. `python -c "import secrets; print(secrets.token_hex(32))"`)
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY environment variable}"
    ports:
      - "5000:5000"
    volumes:
      - sqlite_data:/app/instance

volumes:
  sqlite_data:
